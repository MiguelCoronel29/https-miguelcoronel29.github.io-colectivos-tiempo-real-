<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Colectivos en Tiempo Real - Línea 180</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Mapbox CSS y JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.js"></script>

    <link rel="manifest" href="manifest.json">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        /* Botón menú (☰) */
        #menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 130;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        #menu-btn:hover {
            background: #0055dd;
            transform: scale(1.1);
        }

        /* Panel lateral */
        #buses-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 340px;
            height: 100%;
            background: #1f1f1f;
            box-shadow: 6px 0 30px rgba(0, 0, 0, 0.8);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            z-index: 140;
            overflow-y: auto;
            padding: 20px;
            border-right: 4px solid #0066ff;
        }

        #buses-panel.open {
            transform: translateX(0);
        }

        /* Botón cerrar - Versión corregida */
        #close-panel-btn {
            position: absolute;
            top: 18px;
            right: 18px;
            background: none;
            border: none;
            color: #ff5555;
            font-size: 30px;
            cursor: pointer;
            z-index: 150;
            padding: 4px 8px;
            line-height: 1;
        }

        #close-panel-btn:hover {
            color: #ff8888;
            transform: scale(1.2);
        }

        /* Título */
        #buses-panel h2 {
            margin-top: 12px;
            margin-bottom: 25px;
            text-align: center;
            color: #fff;
            font-size: 22px;
        }

        /* Ramales */
        .ramal-item {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ddd;
            font-size: 15px;
        }

        .ramal-item input[type="checkbox"] {
            accent-color: #0066ff;
            transform: scale(1.25);
            cursor: pointer;
        }

        /* Botón Mi Ubicación */
        .floating-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            z-index: 120;
        }

        .floating-btn:hover {
            background: #0055dd;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <button id="menu-btn">☰</button>

    <!-- Panel lateral -->
    <div id="buses-panel">
        <button id="close-panel-btn">✕</button>

        <div style="margin-top: 55px; text-align: center;">
            <h2 style="color:#fff; margin-bottom: 25px; font-size: 22px;">
                🚌 Linea 180
            </h2>
        </div>

        <div style="background:#2a2a2a; padding:18px; border-radius:10px;">
            <strong style="color:#fff; display:block; margin-bottom:15px;">Ramales</strong>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-a-idayvuelta" checked>
                <label for="ramal-a-idayvuelta">A - (X155) - González Catán hasta Correo Central</label>
            </div>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-a-correo" checked>
                <label for="ramal-a-correo">A - (X155) - Correo Central hasta González Catán</label>
            </div>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-b-primerajunta" checked>
                <label for="ramal-b-primerajunta">B - (Primera Junta) - González Catán hasta Primera Junta</label>
            </div>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-a-gonzalezcatan" checked>
                <label for="ramal-a-gonzalezcatan">B - (Primera Junta) - Primera junta hasta gonzález catán</label>
            </div>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-san-alberto" checked>
                <label for="ramal-san-alberto">C - Hasta San Alberto</label>
            </div>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-c-primera-junta" checked>
                <label for="ramal-c-primera-junta">C - Hasta Primera Junta</label>
            </div>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-d-san-justo" checked>
                <label for="ramal-d-san-justo">D - Hasta San Justo</label>
            </div>

            <div class="ramal-item">
                <input type="checkbox" id="ramal-d-primera-junta" checked>
                <label for="ramal-d-primera-junta">D - Hasta Primera Junta</label>
            </div>

        </div>
    </div>

    <!-- Botón Mi Ubicación -->
    <button id="myLocationBtn" class="floating-btn">📍</button>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>

    <script src="app.js"></script>

    <!-- Control del panel -->
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const busesPanel = document.getElementById('buses-panel');
        const closeBtn = document.getElementById('close-panel-btn');

        menuBtn.addEventListener('click', () => busesPanel.classList.toggle('open'));
        closeBtn.addEventListener('click', () => busesPanel.classList.remove('open'));

        // ==================== CONTROL DE RUTAS ====================

        // Ramal A completo (ida y vuelta)
        const chkRamalA = document.getElementById('ramal-a-idayvuelta');
        chkRamalA.addEventListener('change', () => {
            const visible = chkRamalA.checked;
            if (map && map.getLayer('ruta-180-layer')) {
                map.setLayoutProperty('ruta-180-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

        // Ramal A hacia Correo Central
        const chkRamalACorreo = document.getElementById('ramal-a-correo');
        chkRamalACorreo.addEventListener('change', () => {
            const visible = chkRamalACorreo.checked;
            if (map && map.getLayer('ruta-180-correo-layer')) {
                map.setLayoutProperty('ruta-180-correo-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

        // Ramal B hacia Primera Junta
        const chkRamalB = document.getElementById('ramal-b-primerajunta');
        chkRamalB.addEventListener('change', () => {
            const visible = chkRamalB.checked;
            if (map && map.getLayer('ruta-180-aprimerajunta-layer')) {
                map.setLayoutProperty('ruta-180-aprimerajunta-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

        // Ramal B hacia gonzalez catan
        const chkGonzalezCatan = document.getElementById('ramal-a-gonzalezcatan');
        chkGonzalezCatan.addEventListener('change', () => {
            const visible = chkGonzalezCatan.checked;
            if (map && map.getLayer('ruta-180-agonzalezcatan-layer')) {
                map.setLayoutProperty('ruta-180-agonzalezcatan-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

        // Ramal hacia San Alberto
        const chkSanAlberto = document.getElementById('ramal-san-alberto');
        chkSanAlberto.addEventListener('change', () => {
            const visible = chkSanAlberto.checked;
            if (map && map.getLayer('ruta-180-asanalberto-layer')) {
                map.setLayoutProperty('ruta-180-asanalberto-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

        // Ramal C hacia Primera Junta
        const chkRamalC = document.getElementById('ramal-c-primera-junta');
        chkRamalC.addEventListener('change', () => {
            const visible = chkRamalC.checked;
            if (map && map.getLayer('ruta-180-linea-c-hasta-primera-junta-layer')) {
                map.setLayoutProperty('ruta-180-linea-c-hasta-primera-junta-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

        // Ramal D hacia San Justo
        const chkRamalD = document.getElementById('ramal-d-san-justo');
        chkRamalD.addEventListener('change', () => {
            const visible = chkRamalD.checked;
            if (map && map.getLayer('ruta-180-linea-d-hasta-san-justo-layer')) {
                map.setLayoutProperty('ruta-180-linea-d-hasta-san-justo-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

        // Ramal D hacia Primera Junta
        const chkRamalDPrimera = document.getElementById('ramal-d-primera-junta');
        chkRamalDPrimera.addEventListener('change', () => {
            const visible = chkRamalDPrimera.checked;
            if (map && map.getLayer('ruta-180-linea-d-hasta-primera-junta-layer')) {
                map.setLayoutProperty('ruta-180-linea-d-hasta-primera-junta-layer', 'visibility', visible ? 'visible' : 'none');
            }
        });

    </script>

</body>

</html>
