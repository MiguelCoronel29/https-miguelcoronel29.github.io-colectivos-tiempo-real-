<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Colectivos en Tiempo Real - Guernica y Zona</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <!-- Mapbox CSS y JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.0/mapbox-gl.js"></script>

    <link rel="manifest" href="manifest.json">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; 
            overflow: hidden; 
            background: #111; 
            font-family: Arial, sans-serif; 
        }

        #map {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
        }

        /* Botón menú (3 líneas) - esquina superior izquierda */
        #menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        #menu-btn:hover {
            background: #0055cc;
            transform: scale(1.1);
        }

        /* Panel lateral que se desliza desde la izquierda */
        #buses-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100%;
            background: #1e1e1e;
            box-shadow: 4px 0 20px rgba(0,0,0,0.6);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            z-index: 90;
            overflow-y: auto;
            padding: 20px;
        }

        #buses-panel.open {
            transform: translateX(0);
        }

        /* Botones flotantes inferiores (estilo Google Maps) */
        .floating-btn {
            position: absolute;
            right: 20px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 100;
        }

        #myLocationBtn { bottom: 90px; }
        #centerAllBtn   { bottom: 20px; }

        .bus {
            background: #222;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 6px solid;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- Botón menú (3 líneas) -->
    <button id="menu-btn">☰</button>

    <!-- Panel lateral de colectivos -->
    <div id="buses-panel">
        <h2 style="color:#fff; margin-bottom:15px; text-align:center;">🚌 Colectivos en Tiempo Real</h2>
        <div id="buses">Cargando colectivos...</div>
    </div>

    <!-- Botones flotantes -->
    <button id="myLocationBtn" class="floating-btn">📍</button>
    <button id="centerAllBtn" class="floating-btn">🎯</button>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Fallo al registrar Service Worker:', error);
                    });
            });
        }
    </script>

    <script src="app.js"></script>

    <!-- Script para abrir/cerrar el panel deslizante -->
    <script>
        const menuBtn = document.getElementById('menu-btn');
        const busesPanel = document.getElementById('buses-panel');

        menuBtn.addEventListener('click', () => {
            busesPanel.classList.toggle('open');
        });
    </script>
</body>

</html>
